# M-Motors — composition Docker de base (CI/CD + local)
#
# Frontend (image construite en local) :
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build -d frontend
#
# Pile complète avec HTTPS (nginx → Next.js + API & docs sur /api/*) :
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build -d
#   → https://localhost:8443 (app), https://localhost:8443/api/docs (OpenAPI)
#   Certificat auto-signé (volume nginx_ssl_data) ; SSL_CERT_CN pour le CN OpenSSL.
#
# Déploiement (images GHCR déjà buildées) — ne pas utiliser docker-compose.build.yml :
#   IMAGE_TAG=sha-abc123 docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
#   IMAGE_TAG=sha-abc123 docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans --no-build --wait
#
# Variables : voir .env.example à la racine (GHCR_OWNER requis sur les serveurs).

name: mmotors

services:
  frontend:
    image: mmotors-frontend:${IMAGE_TAG:-local}
    container_name: mmotors-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Pour nginx HTTPS en même origine : définir NEXT_PUBLIC_API_URL= (vide) dans .env
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  backend:
    image: mmotors-backend:${IMAGE_TAG:-local}
    container_name: mmotors-backend
    environment:
      ENV: ${ENV:-production}
      # À surcharger via .env : ne pas laisser les mots de passe par défaut en production
      DATABASE_URL: ${DATABASE_URL:-postgresql://mmotors:mmotors@postgres:5432/mmotors}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-mmotors-local-dev-only-set-secret-in-dotenv-file-32}
      ALLOWED_ORIGINS: '["http://localhost:${FRONTEND_PORT:-3000}"]'
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    image: mmotors-nginx:${IMAGE_TAG:-local}
    container_name: mmotors-nginx
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    environment:
      SSL_CERT_CN: ${SSL_CERT_CN:-localhost}
    volumes:
      - nginx_ssl_data:/etc/nginx/ssl
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: mmotors-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mmotors}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mmotors}
      POSTGRES_DB: ${POSTGRES_DB:-mmotors}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mmotors} -d ${POSTGRES_DB:-mmotors}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mmotors-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  nginx_ssl_data:
